name: fitness_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Essenziale per il calendario e traduzioni in italiano
  flutter_localizations:
    sdk: flutter

  # Icone per stile iOS
  cupertino_icons: ^1.0.8

  # Database e Autenticazione
  supabase_flutter: ^2.6.0

  # Gestione date e formattazione
  intl: 0.20.2

  # Per aprire i link dei video tutorial
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Suggerimenti per mantenere il codice pulito
  flutter_lints: ^3.0.0

flutter:
  # Abilita le icone Material Design
  uses-material-design: true
  
  # Necessario per la gestione corretta delle traduzioni di sistema
  generate: true

  # Configurazione Asset Immagini
  assets:
    - assets/images/Logo_Gek.png